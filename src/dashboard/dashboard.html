<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJEET Dashboard - Notes & Screenshots</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">📝</span>
                <h1>OJEET</h1>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-view="all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <span>All Notes</span>
                </button>
                <button class="nav-item" data-view="videos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                    </svg>
                    <span>By Video</span>
                </button>
                <button class="nav-item" data-view="screenshots">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>Screenshots</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="exportBtn" class="sidebar-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Export All
                </button>
                <button id="clearAllBtn" class="sidebar-btn danger">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                    Clear All
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search notes, videos...">
                </div>
                <div class="header-stats">
                    <span id="statsDisplay">0 notes • 0 videos</span>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area" id="contentArea">
                <!-- Dynamic content will be rendered here -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📚</div>
                    <h2>No notes yet</h2>
                    <p>Start watching videos and use hotkeys to save notes:</p>
                    <div class="hotkey-grid">
                        <div class="hotkey-card">
                            <kbd>Alt+S</kbd>
                            <span>Screenshot</span>
                        </div>
                        <div class="hotkey-card">
                            <kbd>Alt+T</kbd>
                            <span>Timestamp</span>
                        </div>
                        <div class="hotkey-card">
                            <kbd>Alt+N</kbd>
                            <span>Note + Screenshot</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Viewer Overlay -->
    <div class="viewer-overlay" id="viewerOverlay">
        <div class="viewer-controls">
            <button class="viewer-btn" id="viewerDownload" title="Download">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
            </button>
            <button class="viewer-btn" id="viewerClose" title="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <button class="viewer-nav viewer-nav-prev" id="viewerPrev">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <button class="viewer-nav viewer-nav-next" id="viewerNext">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 6 15 12 9 18" />
            </svg>
        </button>
        <div class="viewer-canvas" id="viewerCanvas">
            <img id="viewerImage" src="" alt="Screenshot" draggable="false">
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" id="confirmCancel">Cancel</button>
                <button class="confirm-btn danger" id="confirmAction">Delete</button>
            </div>
        </div>
    </div>

    <script src="../lib/jszip.min.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
