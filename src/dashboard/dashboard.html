<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJEET Dashboard - Notes & Screenshots</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">📝</span>
                <h1>OJEET</h1>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-view="all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <span>All Notes</span>
                </button>
                <button class="nav-item" data-view="videos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                    </svg>
                    <span>By Video</span>
                </button>
                <button class="nav-item" data-view="screenshots">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>Screenshots</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="exportBtn" class="sidebar-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Export All
                </button>
                <button id="clearAllBtn" class="sidebar-btn danger">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                    Clear All
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search notes, videos...">
                </div>
                <div class="header-stats">
                    <span id="statsDisplay">0 notes • 0 videos</span>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area" id="contentArea">
                <!-- Dynamic content will be rendered here -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📚</div>
                    <h2>No notes yet</h2>
                    <p>Start watching videos and use hotkeys to save notes:</p>
                    <div class="hotkey-grid">
                        <div class="hotkey-card">
                            <kbd>Alt+S</kbd>
                            <span>Screenshot</span>
                        </div>
                        <div class="hotkey-card">
                            <kbd>Alt+T</kbd>
                            <span>Timestamp</span>
                        </div>
                        <div class="hotkey-card">
                            <kbd>Alt+N</kbd>
                            <span>Note + Screenshot</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Screenshot Modal -->
    <div class="modal-overlay" id="screenshotModal">
        <div class="modal-content">
            <div class="modal-toolbar">
                <button class="modal-tool-btn" id="zoomOutBtn" title="Zoom Out">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="modal-tool-btn" id="zoomInBtn" title="Zoom In">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                </button>
                <button class="modal-tool-btn" id="rotateBtn" title="Rotate 90°">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" />
                    </svg>
                </button>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-image-container" id="modalImageContainer">
                <img id="modalImage" src="" alt="Screenshot">
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" id="confirmCancel">Cancel</button>
                <button class="confirm-btn danger" id="confirmAction">Delete</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
